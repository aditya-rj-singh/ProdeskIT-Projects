<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hamlet — Community Theater Production</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Phase 2: Hero ── -->
  <section class="hero">
    <div class="hero__overlay"></div>
    <div class="hero__content">
      <span class="hero__eyebrow">A Community Theater Production</span>
      <h1 class="hero__title">Hamlet</h1>
      <p class="hero__subtitle">By William Shakespeare</p>
      <a href="#tickets" class="hero__btn">Buy Tickets</a>
    </div>
  </section>

  <!-- ── Phase 3: Cast Grid ── -->
  <section class="cast" id="cast">
    <div class="cast__header">
      <span class="cast__eyebrow">The Players</span>
      <h2 class="cast__title">Meet the Cast</h2>
    </div>

    <div class="cast__grid">

      <div class="cast__card">
        <div class="cast__img-wrap">
          <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=600&q=80" alt="James Whitmore as Hamlet" />
        </div>
        <div class="cast__info">
          <h3 class="cast__name">James Whitmore</h3>
          <p class="cast__role">Hamlet</p>
        </div>
      </div>

      <div class="cast__card">
        <div class="cast__img-wrap">
          <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=600&q=80" alt="Eleanor Voss as Ophelia" />
        </div>
        <div class="cast__info">
          <h3 class="cast__name">Eleanor Voss</h3>
          <p class="cast__role">Ophelia</p>
        </div>
      </div>

      <div class="cast__card">
        <div class="cast__img-wrap">
          <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600&q=80" alt="Richard Dane as Claudius" />
        </div>
        <div class="cast__info">
          <h3 class="cast__name">Richard Dane</h3>
          <p class="cast__role">Claudius</p>
        </div>
      </div>

      <div class="cast__card">
        <div class="cast__img-wrap">
          <img src="https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=600&q=80" alt="Margaret Cole as Gertrude" />
        </div>
        <div class="cast__info">
          <h3 class="cast__name">Margaret Cole</h3>
          <p class="cast__role">Gertrude</p>
        </div>
      </div>

      <div class="cast__card">
        <div class="cast__img-wrap">
          <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=600&q=80" alt="Thomas Hale as Horatio" />
        </div>
        <div class="cast__info">
          <h3 class="cast__name">Thomas Hale</h3>
          <p class="cast__role">Horatio</p>
        </div>
      </div>

      <div class="cast__card">
        <div class="cast__img-wrap">
          <img src="https://images.unsplash.com/photo-1554151228-14d9def656e4?w=600&q=80" alt="Diane Marsh as The Ghost" />
        </div>
        <div class="cast__info">
          <h3 class="cast__name">Diane Marsh</h3>
          <p class="cast__role">The Ghost</p>
        </div>
      </div>

    </div>
  </section>

</body>
</html>
