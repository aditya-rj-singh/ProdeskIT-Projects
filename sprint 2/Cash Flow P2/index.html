<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/output.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Cash Flow</title>
</head>

<body class="bg-[#F8FAFC] min-h-screen p-4 md:p-8 text-[#1E293B]">
    <div class="max-w-7xl mx-auto space-y-6">
        <header class="bg-white rounded-2xl p-4 flex justify-between items-center border border-[#E2E8F0] shadow-sm">
            <div class="flex items-center space-x-3">
                <h1 class="text-2xl font-bold text-[#64748B]">Cash Flow</h1>
            </div>
            <button id="reset_btn" class="bg-[#EF4444] border border-[#EF4444] hover:bg-[#DC2626] text-[#EF4444] py-2 px-4 rounded-xl 
                    font-medium text-sm transition-all cursor-pointer flex items-center space-x-2">
                <span>Reset</span>
            </button>
        </header>
        <main class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
            <section class="bg-white rounded-2xl p-6 border border-[#E2E8F0] shadow-sm space-y-5 lg:col-span-1">
                <h2 class="text-lg font-bold text-[#0F172A]">
                    Add Salary/Expense
                </h2>
                <form id="expense_form"  class="space-y-5">
                    <div class="space-y-1.5">
                        <label class="block text-sm font-semibold text-[#334155]">Total Salary</label>
                        <div class="relative rounded-xl shadow-sm">
                            <div class="absolute pl-4 flex items-center text-[475569] font-medium">₹</div>
                            <input type="number" id="salary"  placeholder="Enter Total Salary" class="w-full pl-9 pr-10 py-3 bg-white border border-[#CBD5E1] rounded-xl text-sm transition-all 
                        focus:outline-none focus:ring-2 focus:ring-[#4F46E5] focus:border-[#4F46E5]">
                        </div>
                        <p class="text-xs text-[#64748B]">Enter Your in hand salary</p>
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-sm font-semibold text-[#334155]">Expense Name</label>
                        <div class="relative rounded-xl shadow-sm">
                            <input type="text" id="expense_name" placeholder="Enter Expense Name" class="w-full pl-9 pr-10 py-3 bg-white border border-[#CBD5E1] rounded-xl text-sm transition-all 
                        focus:outline-none focus:ring-2 focus:ring-[#4F46E5] focus:border-[#4F46E5]">
                        </div>
                        <p class="text-xs text-[#64748B]">eg: Rent, Groceries</p>
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-sm font-semibold text-[#334155]">Expense Amount</label>
                        <div class="relative rounded-xl shadow-sm">
                            <div class="absolute pl-4 flex items-center text-[475569] font-medium">₹</div>
                            <input type="number" id="expense_amount" placeholder="Enter Expense Amount" class="w-full pl-9 pr-10 py-3 bg-white border border-[#CBD5E1] rounded-xl text-sm transition-all 
                        focus:outline-none focus:ring-2 focus:ring-[#4F46E5] focus:border-[#4F46E5]">
                        </div>
                        <p class="text-xs text-[#64748B]">Enter the expense amount</p>
                    </div>
                </form>
                <button type="submit" id="Add_expense"
                    class="w-full bg-[#4F46E5] hover:bg-[#4338CA] text-white py-3 px-4 rounded-xl font-medium text-sm flex items-center justify-center space-x-2 cursor-pointer transition-all">
                    <span class="text-lg font-semibold">Add Expense</span>
                </button>
                <div id="note_bg" class="bg-[#EFF6FF] border px-2 border-[#BFDBFE] rounded-xl flex items-center space-x-2.5">
                    <p id="form_note" class=" text-[#334155] leading-relaxed font-semibold ">&#x2a;Note: Enter Your Salary First.</p>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-[#E2E8F0] shadow-sm flex flex-col items-center">
                        <h2 class="text-sm font-semibold text-[#334155] self-start mb-4">Expense Chart</h2>
                        <div class="w-full max-w-62.5 aspect-square">
                            <canvas id="expense_chart"></canvas>
                        </div>
                </div>
            </section>
            <div class="lg:col-span-2 space-y-6">
                <section class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div
                        class="bg-white p-5 rounded-2xl border border-[#E2E8F0] flex justify-between shadow-sm items-start overflow-x-auto scrollbar-thin">
                        <div class="space-y-1" id="total_salary">
                            <p class="text-xs font-semibold text-[#4F46E5] uppercase tracking-wider">Total Salary</p>
                            <h3 class="text-2xl font-bold text-[#4F46E5]">₹0</h3>
                        </div>
                    </div>
                    <div
                        class="bg-white p-5 rounded-2xl border border-[#E2E8F0] flex justify-between shadow-sm items-start overflow-x-auto scrollbar-thin">
                        <div class="space-y-1" id="total_expense">
                            <p class="text-xs font-semibold text-[#EF4444] uppercase tracking-wider">Total Expenses</p>
                            <h3 class="text-2xl font-bold text-[#EF4444]">₹0</h3>
                        </div>
                    </div>
                    <div
                        class="bg-white p-5 rounded-2xl border border-[#E2E8F0] flex justify-between shadow-sm items-start overflow-x-auto scrollbar-thin">
                        <div class="space-y-1" id="balance">
                            <p class="text-xs font-semibold text-[#22C55E] uppercase tracking-wider">Remaining Balance
                            </p>
                            <h3 class="text-2xl font-bold text-[#22C55E]">₹0</h3>
                        </div>
                    </div>
                    
                </section>

                <section class="bg-white rounded-2xl border border-[#E2E8F0] shadow-sm overflow-hidden">
                    <div class="p-5 flex item-center justify-between border-b border-[#F1F5F9]">
                        <h2 class="text-base font-bold text-[#0F172A]">Expense List</h2>
                    </div>

                    <div class="w-full max-h-96 overflow-y-auto overflow-x-auto scrollbar-thin">
                        <table class="w-full text-left border-collapse text-sm min-w-125 md:min-w-full">

                            <thead>
                                <tr class="text-[#64748B] font-medium border-b border-[#F1F5F9] bg-slate-50/50">
                                    <th class="p-4 w-12 text-center">Sn.</th>
                                    <th class="p-4">Expense Name</th>
                                    <th class="p-4">Amount</th>
                                    <th class="p-4">Date</th>
                                    <th class="p-4 text-center w-20">Action</th>

                                </tr>
                            </thead>

                            <tbody id="table_body" class="divide-y divide-[#F1F5F9]"></tbody>
                        </table>
                    </div>

                    <div
                        class="p-4 bg-slate-50/50 border-t border-[#F1F5F9] flex items-center justify-between px-5 font-bold text-sm">
                        <span class="text-[#334155]">Total Expense</span>
                        <span class="text-base text-[#0F172A]" id="total_expense_footer">₹0</span>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
