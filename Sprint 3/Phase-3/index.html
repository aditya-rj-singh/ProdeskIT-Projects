<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen">
    <div class="max-w-2xl mx-auto px-4 py-10">
        <h1 class="text-3xl font-bold text-slate-800 mb-8 text-center">
            GitHub Profile Finder
        </h1>

        <div class="flex gap-3 mb-6">

            <input type="text" id="username" placeholder="GitHub Username"
                class="flexx-1 px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-slate-400"/>
                <input type="text" id="username2" placeholder="GitHub Username"
                    class=" hidden flex-1 px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-slate-400"/>
                <button id="searchBtn" class="px-5 py-3 bg-slate-900 text-white rounded-lg hover:bg-slate-700 transition">
                    Search
                </button>
                <div class="flex items-center gap-3 ">
                    <span class="font-medium ">
                        Battle Mode
                    </span>
                    <button id="battlebtn" class="bg-slate-200 px-4 py-2 rounded-lg">
                        OFF
                    </button>
                </div>
        </div>

        <p id="loading" class="text-blue-600 font-medium mb-4"></p>
        <div id="profile" class="mb-6"></div>
        <div id="repos" class="space-y-3"></div>

        <script src="main.js"></script>
    </div>

</body>

</html>
